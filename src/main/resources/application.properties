spring.application.name=zjc-airline-booking-backend

# 服务器配置
server.port=8080

# 数据库配置
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/zjc_airline_booking_db?useSSL=false&serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# JPA 配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JSON 配置
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# DeepSeek AI 配置
deepseek.api.base-url=${DEEPSEEK_API_BASE_URL:https://api.deepseek.com/v1}
deepseek.api.key=${DEEPSEEK_API_KEY:}
